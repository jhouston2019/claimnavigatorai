<!--
  Reusable Author Box Component - E-E-A-T Layer
  Include this snippet in pillar guides, SEO pages, and tool pages.
  
  Usage:
  - For pillar guides: Place at top after H1 (inside hero-section or first content block)
  - For SEO/tool pages: Place at bottom before related-links section
  
  Customize lastReviewed for each page: data-last-reviewed="February 28, 2026"
-->
<div class="author-box" data-last-reviewed="February 28, 2026">
  <div class="author-box-inner">
    <div class="author-box-avatar">
      <span class="author-box-initials">MC</span>
    </div>
    <div class="author-box-content">
      <div class="author-box-meta">
        <a href="/about/founder.html" class="author-box-name">Michael Chen</a>
        <span class="author-box-sep">•</span>
        <span class="author-box-positioning">15+ years property claim documentation expertise</span>
      </div>
      <p class="author-box-specialization">Specialization: Insurance estimate analysis and supplement strategy</p>
      <p class="author-box-reviewed">
        Last reviewed: <span class="author-box-date"></span>
      </p>
    </div>
  </div>
</div>

<style>
.author-box {
  background: #F7F9FC;
  border: 1px solid #e5e7eb;
  border-left: 4px solid #17BEBB;
  border-radius: 8px;
  padding: 1.25rem 1.5rem;
  margin: 1.5rem 0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
}
.author-box-inner {
  display: flex;
  align-items: flex-start;
  gap: 1rem;
  flex-wrap: wrap;
}
.author-box-avatar {
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, #0B2545 0%, #123A63 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.author-box-initials {
  color: #fff;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.5px;
}
.author-box-content { flex: 1; min-width: 200px; }
.author-box-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 0.35rem;
  margin-bottom: 0.35rem;
}
.author-box-name {
  color: #17BEBB;
  text-decoration: none;
  font-weight: 600;
  font-size: 1.05rem;
}
.author-box-name:hover { text-decoration: underline; }
.author-box-sep { color: #9ca3af; font-size: 0.85rem; }
.author-box-positioning {
  color: #4b5563;
  font-size: 0.9rem;
}
.author-box-specialization {
  color: #6b7280;
  font-size: 0.9rem;
  margin: 0.25rem 0 0.5rem;
  line-height: 1.5;
}
.author-box-reviewed {
  color: #9ca3af;
  font-size: 0.85rem;
  margin: 0;
}
.author-box-date { font-weight: 500; color: #6b7280; }
</style>

<script>
(function() {
  var box = document.querySelector('.author-box');
  if (box) {
    var date = box.getAttribute('data-last-reviewed');
    var span = box.querySelector('.author-box-date');
    if (span && date) span.textContent = date;
  }
})();
</script>
